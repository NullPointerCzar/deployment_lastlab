name: Django Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django selenium webdriver-manager

      - name: Set up Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Django unit tests
        run: |
          python manage.py test notes.tests.NoteModelTests --verbosity=2

      - name: Run Selenium tests
        run: |
          python manage.py test notes.tests.NoteSeleniumTests --verbosity=2

  docker:
    runs-on: ubuntu-latest
    needs: test          # only build the image if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t notesapp:latest .

      - name: Verify container starts
        run: |
          docker run --rm -d --name notesapp_test -p 8000:8000 notesapp:latest
          sleep 5
          docker ps | grep notesapp_test
          docker stop notesapp_test

