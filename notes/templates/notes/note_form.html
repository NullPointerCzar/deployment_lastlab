<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Note</title>
</head>
<body>
    <h1>Create Note</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        {% if form.description.errors %}
            <ul class="errorlist">
                {% for error in form.description.errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'note_list' %}">Back</a>
</body>
</html>
