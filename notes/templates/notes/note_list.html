<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>
</head>
<body>
    <h1>Notes</h1>
    <a href="{% url 'note_create' %}">Add New Note</a>
    <ul>
        {% for note in notes %}
            <li>{{ note.description }}</li>
        {% empty %}
            <li>No notes yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
